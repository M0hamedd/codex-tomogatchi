name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Install npm dependencies
        run: npm ci

      - name: Run release checks
        run: npm test

      - name: Build Windows app
        run: npm run dist:win

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codex-tomogatchi-windows
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $files = Get-ChildItem dist\* -File -Include *.exe,*.zip,*.blockmap,latest*.yml | ForEach-Object { $_.FullName }
          if (-not $files) {
            throw "No release artifacts were produced."
          }
          gh release create $env:GITHUB_REF_NAME @files --title "Codex Tomogatchi $env:GITHUB_REF_NAME" --notes "Alpha release build from GitHub Actions."
