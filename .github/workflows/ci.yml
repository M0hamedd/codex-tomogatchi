name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Install npm dependencies
        run: npm ci

      - name: Run checks
        run: npm test

      - name: Validate plugin manifest when validator is available
        shell: pwsh
        run: |
          $validator = Join-Path $env:USERPROFILE ".codex/skills/.system/plugin-creator/scripts/validate_plugin.py"
          if (Test-Path $validator) {
            python $validator plugins/codex-tomogatchi
          } else {
            @'
          import json
          from pathlib import Path
          manifest = Path("plugins/codex-tomogatchi/.codex-plugin/plugin.json")
          data = json.loads(manifest.read_text())
          required = ["name", "version", "description", "skills", "interface"]
          missing = [key for key in required if key not in data]
          if missing:
              raise SystemExit(f"Missing plugin manifest keys: {missing}")
          print("Basic plugin manifest validation passed")
          '@ | python -
          }
